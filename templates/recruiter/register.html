{% extends "base.html" %}
{% block title %}Recruiter Register — EMS{% endblock %}
{% block nav %}
  <a href="/recruiter/login">Login</a>
  <a href="/">Home</a>
{% endblock %}
{% block content %}
<div class="page-wrap narrow" style="padding-top:3rem">
  <div class="glass fade-in">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="font-size:2rem;margin-bottom:.5rem">🏢</div>
      <h1 style="font-size:1.4rem;font-weight:700;letter-spacing:-.02em">Recruiter Account</h1>
      <p style="color:var(--text3);font-size:.85rem;margin-top:.3rem">Start posting jobs and finding talent</p>
    </div>
    <div id="alert" class="alert"></div>
    <form id="form">
      <div class="form-group">
        <label>Full Name</label>
        <input class="form-input" name="full_name" placeholder="John Smith" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-input" name="email" type="email" placeholder="recruiter@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-input" name="password" type="password" placeholder="••••••••" required />
      </div>
      <button class="btn-primary-dark" type="submit" style="margin-top:.5rem">Create Account</button>
    </form>
    <hr class="divider" />
    <p style="text-align:center;font-size:.85rem;color:var(--text3)">
      Already have an account? <a href="/recruiter/login" style="color:var(--accent2)">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const box = document.getElementById('alert');
    const r = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ full_name: fd.get('full_name'), email: fd.get('email'), password: fd.get('password'), role: 'recruiter' }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) { box.className='alert alert-danger show'; box.textContent = data.error || 'Registration failed'; return; }
    box.className='alert alert-success show'; box.textContent='Account created! Redirecting…';
    setTimeout(() => { window.location.href = '/recruiter/login'; }, 900);
  });
</script>
{% endblock %}
