{% extends "base.html" %}
{% block title %}Recruiter Login — EMS{% endblock %}
{% block nav %}
  <a href="/recruiter/register">Register</a>
  <a href="/">Home</a>
{% endblock %}
{% block content %}
<div class="page-wrap narrow" style="padding-top:3.5rem">
  <div class="glass fade-in">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="font-size:2.2rem;margin-bottom:.5rem">🏢</div>
      <h1 style="font-size:1.4rem;font-weight:700;letter-spacing:-.02em">Recruiter Login</h1>
      <p style="color:var(--text3);font-size:.85rem;margin-top:.3rem">Post jobs and view rankings</p>
    </div>
    <div id="alert" class="alert"></div>
    <form id="form">
      <div class="form-group">
        <label>Email</label>
        <input class="form-input" name="email" type="email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-input" name="password" type="password" placeholder="••••••••" required />
      </div>
      <button class="btn-primary-dark" type="submit" style="margin-top:.5rem">Sign In</button>
    </form>
    <hr class="divider" />
    <p style="text-align:center;font-size:.85rem;color:var(--text3)">
      No account? <a href="/recruiter/register" style="color:var(--accent2)">Register as recruiter</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const box = document.getElementById('alert');
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) { box.className='alert alert-danger show'; box.textContent = data.error || 'Login failed'; return; }
    if (data.role !== 'recruiter' && data.role !== 'admin') {
      box.className='alert alert-warning show'; box.textContent = 'This portal is for recruiters only.'; return;
    }
    window.location.href = '/recruiter/dashboard';
  });
</script>
{% endblock %}
