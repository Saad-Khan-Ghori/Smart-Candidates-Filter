{% extends "base.html" %}
{% block title %}Candidate Login — EMS{% endblock %}
{% block nav %}
  <a href="/candidate/register">Register</a>
  <a href="/">Home</a>
{% endblock %}
{% block content %}
<div class="page-wrap narrow" style="padding-top:3.5rem">
  <div class="glass fade-in">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="font-size:2.2rem;margin-bottom:.5rem">👤</div>
      <h1 style="font-size:1.4rem;font-weight:700;letter-spacing:-.02em">Candidate Login</h1>
      <p style="color:var(--text3);font-size:.85rem;margin-top:.3rem">Sign in to track your applications</p>
    </div>
    <div id="alert" class="alert"></div>
    <form id="form">
      <div class="form-group">
        <label>Email</label>
        <input class="form-input" name="email" type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-input" name="password" type="password" placeholder="••••••••" required />
      </div>
      <button class="btn-primary-dark" type="submit" style="margin-top:.5rem">Sign In</button>
    </form>
    <hr class="divider" />
    <p style="text-align:center;font-size:.85rem;color:var(--text3)">
      No account? <a href="/candidate/register" class="link-muted" style="color:var(--accent2)">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const box = document.getElementById('alert');
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      box.className = 'alert alert-danger show';
      box.textContent = data.error || 'Login failed';
      return;
    }
    if (data.role !== 'candidate') {
      box.className = 'alert alert-warning show';
      box.textContent = 'This portal is for candidates only.';
      return;
    }
    window.location.href = '/candidate/jobs';
  });
</script>
{% endblock %}
